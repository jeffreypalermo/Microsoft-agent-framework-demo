name: CI

on:
  push:
    branches: [ master, 'claude/**', 'feature/**' ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    name: Build & Test (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FoundryAgentLocal.sln

      - name: Build
        run: dotnet build FoundryAgentLocal.sln --configuration Release --no-restore -nologo

      - name: Test (unit tests only)
        run: >
          dotnet test tests/FoundryAgentLocal.Tests
          --configuration Release
          --no-build
          --filter "Category!=Integration"
          --logger "trx;LogFileName=results.trx"
          -nologo

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'
